<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Binary Search C Program – Smart Class Display</title>
    <style>
        body {
            font-family: Consolas, monospace;
            background: #f5deb3;
            color: #002f6c;
            padding: 60px;
            cursor: pointer;
        }

        h1 {
            text-align: center;
            color: #003f88;
            font-size: 48px;
            margin-bottom: 40px;
        }

        .container {
            max-width: 1400px;
            margin: auto;
        }

        .code {
            background: #fff8dc;
            padding: 40px;
            border-radius: 15px;
            font-size: 36px;
            line-height: 1.5;
            white-space: pre-wrap;
            border: 4px solid #003f88;
        }

        .explanation {
            margin-top: 30px;
            font-size: 30px;
            color: #003366;
            font-weight: bold;
        }

        .hint {
            margin-top: 40px;
            text-align: center;
            font-size: 24px;
            color: #002244;
        }
    </style>
</head>
<body>

<h1>Binary Search in C – Line by Line Explanation</h1>

<div class="container">
    <div class="code" id="codeBox"></div>
    <div class="explanation" id="explainBox"></div>
    <div class="hint">👉 Click anywhere on the screen to show next line</div>
</div>

<script>
const steps = [
    { code: "#include <stdio.h>", explanation: "Includes input and output functions." },
    { code: "", explanation: "" },
    { code: "int main() {", explanation: "Program execution starts from main function." },
    { code: "    int n, key, low = 0, high, mid, found = 0;", explanation: "Declare variables for binary search." },
    { code: "", explanation: "" },
    { code: "    printf(\"Enter number of elements: \");", explanation: "Ask user for size of array." },
    { code: "    scanf(\"%d\", &n);", explanation: "Store size in n." },
    { code: "", explanation: "" },
    { code: "    int a[n];", explanation: "Declare array." },
    { code: "", explanation: "" },
    { code: "    printf(\"Enter %d sorted elements:\\n\", n);", explanation: "Binary search requires sorted input." },
    { code: "    for(int i = 0; i < n; i++) {", explanation: "Loop to read elements." },
    { code: "        scanf(\"%d\", &a[i]);", explanation: "Store elements in array." },
    { code: "    }", explanation: "End of input loop." },
    { code: "", explanation: "" },
    { code: "    high = n - 1;", explanation: "Set high index." },
    { code: "", explanation: "" },
    { code: "    printf(\"Enter element to search: \");", explanation: "Ask user for key element." },
    { code: "    scanf(\"%d\", &key);", explanation: "Store key value." },
    { code: "", explanation: "" },
    { code: "    while(low <= high) {", explanation: "Loop until search space is valid." },
    { code: "        mid = (low + high) / 2;", explanation: "Find middle index." },
    { code: "", explanation: "" },
    { code: "        if(a[mid] == key) {", explanation: "Check if middle element is key." },
    { code: "            printf(\"Element found at position %d\", mid + 1);", explanation: "Display position." },
    { code: "            found = 1;", explanation: "Set found flag." },
    { code: "            break;", explanation: "Exit loop." },
    { code: "        }", explanation: "End if." },
    { code: "", explanation: "" },
    { code: "        else if(a[mid] < key) {", explanation: "If key is greater, search right side." },
    { code: "            low = mid + 1;", explanation: "Move low pointer." },
    { code: "        }", explanation: "End else if." },
    { code: "", explanation: "" },
    { code: "        else {", explanation: "If key is smaller, search left side." },
    { code: "            high = mid - 1;", explanation: "Move high pointer." },
    { code: "        }", explanation: "End else." },
    { code: "    }", explanation: "End while loop." },
    { code: "", explanation: "" },
    { code: "    if(found == 0) {", explanation: "Check if element not found." },
    { code: "        printf(\"Element not found\");", explanation: "Display message." },
    { code: "    }", explanation: "End condition." },
    { code: "", explanation: "" },
    { code: "    return 0;", explanation: "End of program." },
    { code: "}", explanation: "End of main function." }
];

let index = 0;
const codeBox = document.getElementById("codeBox");
const explainBox = document.getElementById("explainBox");

document.body.addEventListener("click", () => {
    if (index < steps.length) {
        codeBox.innerHTML += steps[index].code + "\n";
        explainBox.innerHTML = "💡 " + steps[index].explanation;
        index++;
    }
});
</script>

</body>
</html>
